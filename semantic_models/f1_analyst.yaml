        expr: round_number
        data_type: NUMBER
      - name: race_name
        synonyms: ["qualifying grand prix", "qualifying event"]
        description: "Official race name."
        expr: race_name
        data_type: VARCHAR
      - name: driver_name
        synonyms: ["qualifying driver", "quali driver"]
        description: "Driver full name."
        expr: driver_name
        data_type: VARCHAR
      - name: constructor_name
        synonyms: ["qualifying constructor", "qualifying team"]
        description: "Constructor or team name."
        expr: constructor_name
        data_type: VARCHAR
      - name: qualifying_position
        synonyms: ["qualifying position dimension", "quali grid rank"]
        description: "Final qualifying position."
        expr: qualifying_position
        data_type: NUMBER
      - name: q1_time
        synonyms: ["q1", "q1 lap time"]
        description: "Q1 lap time text."
        expr: q1_time
        data_type: VARCHAR
      - name: q2_time
        synonyms: ["q2", "q2 lap time"]
        description: "Q2 lap time text."
        expr: q2_time
        data_type: VARCHAR
      - name: q3_time
        synonyms: ["q3", "q3 lap time"]
        description: "Q3 lap time text."
        expr: q3_time
        data_type: VARCHAR
      - name: qualifying_pole_filter
        synonyms: ["qualifying pole filter", "qualified first flag"]
        description: "True when the driver qualified first."
        expr: qualifying_position = 1
        data_type: BOOLEAN
        labels:
          - filter
    time_dimensions:
      - name: race_date
        synonyms: ["qualifying race date", "qualifying event date"]
        description: "Calendar date of the race."
        expr: race_date
        data_type: DATE
    facts:
      - name: qualifying_position_value
        synonyms: ["qualifying position fact", "numeric qualifying result"]
        description: "Final qualifying position as a numeric fact."
        expr: qualifying_position
