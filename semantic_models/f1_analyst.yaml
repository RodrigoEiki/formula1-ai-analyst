      - name: average_qualifying_position
        synonyms: ["average qualifying result rank", "mean quali position"]
        description: "Average qualifying position."
        expr: AVG(qualifying_position)

module_custom_instructions:
  sql_generation: |
    Prefer the most specific logical table for the user's question.
    Use driver_race_results for race-level driver wins, podiums, points, finishing positions, and circuits.
    Use constructor_race_results for constructor or team points, wins, and podiums by race.
    Use race_summary for race winners, podium lists, race counts, and circuit hosting questions.
    Use driver_season_standings for final driver championship standings and world titles.
    Use constructor_season_standings for final constructor championship standings and constructor titles.
    Use qualifying_results for qualifying position and pole-position questions.
    Interpret "team" as constructor.
    Interpret "Grand Prix", "GP", and "race" as race_name unless the user asks for a count of races.
    When ranking drivers or constructors, order by the requested metric descending unless the question asks for lowest or worst.
  question_categorization: |
    The semantic view covers historical Formula 1 race, qualifying, constructor, driver, circuit, and championship data.
    If a question asks for live race results, betting odds, weather, regulations, or current news, classify it as outside this dataset.

verified_queries:
  - name: driver_wins_2021
    question: "Which drivers won the most races in the 2021 season?"
    verified_by: "Formula 1 AI Analyst"
    use_as_onboarding_question: true
    sql: |
      SELECT
          driver_name,
          SUM(IFF(classified_position = 1, 1, 0)) AS wins
      FROM __driver_race_results
      WHERE season = 2021
      GROUP BY driver_name
      ORDER BY wins DESC, driver_name;

  - name: constructor_points_2022
    question: "Which constructor scored the most points in 2022?"
    verified_by: "Formula 1 AI Analyst"
    use_as_onboarding_question: true
    sql: |
      SELECT
          constructor_name,
          SUM(constructor_points) AS constructor_points
      FROM __constructor_race_results
      WHERE season = 2022
      GROUP BY constructor_name
      ORDER BY constructor_points DESC
      LIMIT 10;

  - name: podiums_by_driver_2020
    question: "Show podium finishes by driver for the 2020 season."
    verified_by: "Formula 1 AI Analyst"
    use_as_onboarding_question: true
    sql: |
      SELECT
          driver_name,
          SUM(IFF(classified_position <= 3, 1, 0)) AS podiums
      FROM __driver_race_results
      WHERE season = 2020
      GROUP BY driver_name
      ORDER BY podiums DESC, driver_name;

  - name: circuits_with_most_races
    question: "Which circuits hosted the most Formula 1 races?"
    verified_by: "Formula 1 AI Analyst"
    use_as_onboarding_question: true
    sql: |
      SELECT
          circuit_name,
          circuit_country,
          COUNT(*) AS races_hosted
      FROM __race_summary
      GROUP BY circuit_name, circuit_country
      ORDER BY races_hosted DESC, circuit_name
      LIMIT 10;

  - name: ferrari_mercedes_points_by_season
    question: "Compare Ferrari and Mercedes points by season."
    verified_by: "Formula 1 AI Analyst"
    use_as_onboarding_question: false
    sql: |
      SELECT
          season,
          constructor_name,
          SUM(constructor_points) AS constructor_points
      FROM __constructor_race_results
      WHERE constructor_name IN ('Ferrari', 'Mercedes')
      GROUP BY season, constructor_name
      ORDER BY season, constructor_name;

  - name: driver_world_champions
    question: "List the Formula 1 world drivers champions by season."
    verified_by: "Formula 1 AI Analyst"
    use_as_onboarding_question: true
    sql: |
      SELECT
          season,
          driver_name,
          season_points,
          season_wins
      FROM __driver_season_standings
      WHERE championship_position = 1
      ORDER BY season;

  - name: pole_positions_by_driver
    question: "Which drivers have the most pole positions?"
    verified_by: "Formula 1 AI Analyst"
    use_as_onboarding_question: false
    sql: |
      SELECT
          driver_name,
          SUM(IFF(qualifying_position = 1, 1, 0)) AS pole_positions
      FROM __qualifying_results
      GROUP BY driver_name
      ORDER BY pole_positions DESC, driver_name
      LIMIT 10;
